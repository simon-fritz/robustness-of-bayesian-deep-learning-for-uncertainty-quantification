data:
  name: pneumoniamnist
  flag: pneumoniamnist
  num_classes: 2
  in_channels: 1
  image_size: 28
  root: ./data
  download: true
  batch_size: 128
  num_workers: 4
model:
  name: pretrained_resnet18
  weights: imagenet
  freeze_backbone: false
  num_classes: ???
  input_channels: 3
  input_resolution: 224
method:
  name: deep_ensemble
  bayesian_layers: []
  n_samples: 1
  n_members: 5
  training:
    optimizer: adam
    lr: 0.001
    weight_decay: 0.0001
    epochs: 2
    early_stopping_patience: 0
    use_class_weights: true
experiment_name: pneumonia_deep_ensemble
run_name: pneumonia_deep_ensemble
seed: 42
output_dir: outputs
checkpoint_dir: checkpoints
