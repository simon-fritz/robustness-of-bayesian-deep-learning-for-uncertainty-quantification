data:
  name: pneumoniamnist
  flag: pneumoniamnist
  num_classes: 2
  in_channels: 1
  image_size: 28
  root: ./data
  download: true
  batch_size: 128
  num_workers: 4
  image_transform:
    resize: 224
    expand_channels_to: 3
    normalize:
      mean:
      - 0.485
      - 0.456
      - 0.406
      std:
      - 0.229
      - 0.224
      - 0.225
model:
  name: pretrained_resnet18
  weights: imagenet
  freeze_backbone: false
  num_classes: ???
  input_channels: 3
  input_resolution: 224
method:
  name: last_layer_laplace
  bayesian_layers:
  - fc
  training:
    optimizer: adam
    lr: 0.0001
    weight_decay: 0.0001
    epochs: 15
    early_stopping_patience: 5
    use_class_weights: true
    use_amp: false
  laplace:
    subset_of_weights: last_layer
    hessian_structure: full
    prior_precision_method: marglik
    n_predictive_samples: 100
experiment_name: pneumonia_resnet18_lll
run_name: pneumonia_resnet18_lll
seed: 0
ood_datasets:
- bloodmnist
- organamnist
output_dir: outputs
checkpoint_dir: checkpoints
