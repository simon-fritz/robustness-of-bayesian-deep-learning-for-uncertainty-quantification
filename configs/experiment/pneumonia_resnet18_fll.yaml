# Experiment: First-Layer Laplace on a pre-trained ResNet-18, PneumoniaMNIST.
# Same architecture + MAP phase as pneumonia_resnet18_lll, but the Gaussian
# posterior sits over the stem conv (conv1) instead of the classifier head —
# probing *where* in the network the Bayesian treatment matters.
defaults:
  - /data: pneumoniamnist
  - /model: resnet18
  - /method: first_layer_laplace
  - _self_

experiment_name: pneumonia_resnet18_fll
run_name: pneumonia_resnet18_fll
seed: 42

# OOD sources to evaluate against (resolved by data/ood_pairs.py).
ood_datasets: [bloodmnist, organamnist]

# ImageNet-style preprocessing required by the pretrained ResNet-18.
data:
  image_transform:
    resize: 224
    expand_channels_to: 3
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

method:
  # Trains its own MAP model (self-contained). To instead reuse an existing
  # MAP checkpoint of the same seed and skip the fine-tune (the Laplace fit is
  # post-hoc), add `reuse_map_from: pneumonia_resnet18_lll` or point
  # `map_checkpoint:` at an explicit readable best.pt.
  training:
    lr: 1.0e-4
    epochs: 15
    use_amp: false      # opt-in CUDA mixed precision

output_dir: outputs
checkpoint_dir: checkpoints
