defaults:
  - /data: pneumoniamnist
  - /model: resnet18
  - /method: deep_ensemble
  - _self_

experiment_name: pneumonia_ensemble_n100
run_name: pneumonia_ensemble_n100
seed: 42

data:
  train_size: 100
  image_transform:
    resize: 224
    expand_channels_to: 3
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

method:
  n_members: 5

output_dir: outputs
checkpoint_dir: checkpoints
