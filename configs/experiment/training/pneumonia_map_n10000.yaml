# Data-efficiency variant of pneumonia_resnet18_baseline (deterministic MAP):
# training capped to 10000 examples (random subsample under the global seed;
# val/test untouched). Pairs with pneumonia_map_n100 / pneumonia_map_n1000.
# (PneumoniaMNIST's train split has only a few thousand examples, so this cap
# is effectively a no-op / "full data" anchor point of the sweep.)
#
# Architecture: ImageNet-pretrained ResNet-18 — identical to the full-data /
# long-tail MAP runs, so the sweep is comparable both across methods and back to
# the main experiments. (See docs/architecture_choice.md.)
defaults:
  - /data: pneumoniamnist
  - /model: resnet18
  - /method: deterministic
  - _self_

experiment_name: pneumonia_map_n10000
run_name: pneumonia_map_n10000
seed: 42

# ImageNet-style preprocessing required by the pretrained ResNet-18:
# 28x28 grayscale -> 224x224, expanded to 3 channels, ImageNet-normalized.
data:
  train_size: 10000
  image_transform:
    resize: 224
    expand_channels_to: 3
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Fine-tuning choices (live in the method/training layer, not model):
# lower LR + fewer epochs than the from-scratch SmallCNN.
method:
  lr: 1.0e-4
  epochs: 15
  use_amp: false

output_dir: outputs
checkpoint_dir: checkpoints
