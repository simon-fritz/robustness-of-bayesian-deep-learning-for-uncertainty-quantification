# Experiment: Deep-ensemble on PneumoniaMNIST.
defaults:
  - /data: pneumoniamnist
  - /model: resnet18
  - /method: deep_ensemble
  - _self_

experiment_name: pneumonia_deep_ensemble
run_name: pneumonia_deep_ensemble
seed: 42

# Pretrained ResNet-18 expects ImageNet-style preprocessing.
data:
  image_transform:
    resize: 224
    expand_channels_to: 3
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Number of ensemble members (will override method default if present)
method:
  n_members: 5

output_dir: outputs
checkpoint_dir: checkpoints
