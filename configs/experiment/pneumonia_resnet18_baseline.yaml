# Experiment: Deterministic pre-trained ResNet-18 on PneumoniaMNIST.
# Second architecture (vs. small_cnn baseline) — see docs/architecture_choice.md.
defaults:
  - /data: pneumoniamnist
  - /model: resnet18
  - /method: deterministic
  - _self_

experiment_name: pneumonia_resnet18_baseline
run_name: pneumonia_resnet18_baseline
seed: 42

# ImageNet-style preprocessing required by the pretrained ResNet-18:
# 28x28 grayscale -> 224x224, expanded to 3 channels, ImageNet-normalized.
data:
  image_transform:
    resize: 224
    expand_channels_to: 3
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

# Fine-tuning training choices (live in the method/training layer, not model):
# lower LR + fewer epochs than the from-scratch SmallCNN.
method:
  lr: 1.0e-4
  epochs: 15
  use_amp: false        # opt-in CUDA mixed precision

output_dir: outputs
checkpoint_dir: checkpoints
